<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çay Karak Cafe - المنيو الإلكتروني</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FFCC00;
            --primary-dark: #E6B800;
            --black: #1A1A1A;
            --brown: #754221;
            --white: #FFFFFF;
            --gray: #F5F5F5;
            --dark-gray: #333;
            --success: #4CAF50;
            --danger: #f44336;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--gray);
            color: var(--black);
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 1rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--black);
            cursor: pointer;
        }

        .logo i {
            font-size: 2rem;
            color: var(--brown);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cart-btn {
            position: relative;
            background: var(--black);
            color: var(--primary);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .cart-btn:hover {
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .lang-switcher {
            display: flex;
            gap: 5px;
            background: rgba(255,255,255,0.3);
            padding: 5px;
            border-radius: 25px;
        }

        .lang-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 20px;
            font-weight: 600;
            transition: all 0.3s;
            font-family: inherit;
        }

        .lang-btn.active {
            background: var(--black);
            color: var(--primary);
        }

        .admin-btn {
            background: var(--black);
            color: var(--primary);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .admin-btn:hover {
            transform: scale(1.05);
        }

        /* Main Content */
        .main-content {
            margin-top: 100px;
            padding: 2rem 1rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 1rem 0;
            margin-bottom: 2rem;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-btn {
            flex-shrink: 0;
            padding: 12px 24px;
            background: var(--white);
            border: 2px solid transparent;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
            font-family: inherit;
            font-size: 1rem;
        }

        .category-btn:hover, .category-btn.active {
            background: var(--primary);
            border-color: var(--black);
            transform: translateY(-2px);
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(45deg, #f0f0f0, #e0e0e0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--brown);
            position: relative;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .add-to-cart-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 20px;
            display: flex;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .product-card:hover .add-to-cart-overlay {
            opacity: 1;
        }

        .add-to-cart-btn {
            background: var(--primary);
            color: var(--black);
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .add-to-cart-btn:hover {
            transform: scale(1.05);
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.5rem;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--black);
            margin-bottom: 0.25rem;
        }

        .product-name-tr, .product-name-en {
            font-size: 0.9rem;
            color: #666;
            font-weight: 500;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--brown);
            background: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .product-desc {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-top: 0.5rem;
        }

        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-family: inherit;
        }

        .edit-btn {
            background: var(--primary);
            color: var(--black);
        }

        .delete-btn {
            background: var(--danger);
            color: white;
        }

        .toggle-btn {
            background: var(--success);
            color: white;
        }

        .toggle-btn.hidden {
            background: #ccc;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: var(--white);
            box-shadow: -5px 0 30px rgba(0,0,0,0.2);
            z-index: 1500;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            background: var(--primary);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-title {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            padding: 1rem;
            background: var(--gray);
            border-radius: 15px;
            margin-bottom: 1rem;
            align-items: center;
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--brown);
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .cart-item-price {
            color: var(--brown);
            font-weight: 600;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border: none;
            background: var(--white);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        .remove-item {
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 2px solid var(--gray);
            background: var(--white);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: var(--black);
            color: var(--primary);
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .checkout-btn:hover {
            transform: scale(1.02);
        }

        .empty-cart {
            text-align: center;
            padding: 3rem;
            color: #999;
        }

        .empty-cart i {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #ddd;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--black);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--black);
            color: var(--white);
            padding: 2rem 1rem;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--primary);
            color: var(--black);
        }

        .admin-content {
            padding: 2rem;
            background: var(--gray);
            overflow-y: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--black);
        }

        .chart-container {
            background: var(--white);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .chart-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--black);
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .image-upload {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .image-upload:hover {
            border-color: var(--primary);
            background: rgba(255,204,0,0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--black);
            color: var(--primary);
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
            font-family: inherit;
        }

        .submit-btn:hover {
            transform: scale(1.02);
        }

        .add-product-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--black);
            color: var(--primary);
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s;
            z-index: 100;
        }

        .add-product-fab:hover {
            transform: scale(1.1) rotate(90deg);
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1400;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .cart-sidebar {
                width: 100%;
                right: -100%;
            }
            
            .admin-dashboard {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card {
            animation: fadeIn 0.5s ease-out;
        }

        .hidden-product {
            opacity: 0.5;
            filter: grayscale(100%);
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--brown);
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--black);
            color: var(--primary);
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 600;
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo" onclick="showSection('menu')">
                <i class="fas fa-mug-hot"></i>
                <span data-ar="Çay Karak" data-tr="Çay Karak" data-en="Çay Karak">Çay Karak</span>
            </div>
            
            <div class="header-actions">
                <button class="cart-btn" onclick="toggleCart()">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </button>

                <div class="lang-switcher">
                    <button class="lang-btn active" onclick="changeLang('ar')">العربية</button>
                    <button class="lang-btn" onclick="changeLang('tr')">Türkçe</button>
                    <button class="lang-btn" onclick="changeLang('en')">English</button>
                </div>

                <button class="admin-btn" onclick="openAdminLogin()">
                    <i class="fas fa-lock"></i>
                    <span data-ar="الإدارة" data-tr="Yönetim" data-en="Admin">الإدارة</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="closeCart()"></div>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <div class="cart-title">
                <i class="fas fa-shopping-bag"></i>
                <span data-ar="سلة الطلبات" data-tr="Sipariş Sepeti" data-en="Order Cart">سلة الطلبات</span>
            </div>
            <button class="close-cart" onclick="closeCart()">&times;</button>
        </div>
        
        <div class="cart-items" id="cartItems">
            <div class="empty-cart">
                <i class="fas fa-shopping-basket"></i>
                <div data-ar="السلة فارغة" data-tr="Sepet boş" data-en="Cart is empty">السلة فارغة</div>
            </div>
        </div>
        
        <div class="cart-footer" id="cartFooter" style="display: none;">
            <div class="table-input-section">
                <label class="form-label" data-ar="رقم الطاولة" data-tr="Masa No" data-en="Table Number">رقم الطاولة</label>
                <input type="number" class="form-input" id="tableNumber" placeholder="مثال: 5">
            </div>
            <div class="cart-total">
                <span data-ar="الإجمالي" data-tr="Toplam" data-en="Total">الإجمالي</span>
                <span id="cartTotal">0 TL</span>
            </div>
            <button class="checkout-btn" onclick="checkout()" data-ar="إرسال الطلب" data-tr="Sipariş Gönder" data-en="Send Order">
                إرسال الطلب <i class="fab fa-whatsapp" style="margin-right: 8px;"></i>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Categories -->
        <div class="categories" id="categories">
            <button class="category-btn active" onclick="filterCategory('all')" data-ar="الكل" data-tr="Tümü" data-en="All">الكل</button>
            <button class="category-btn" onclick="filterCategory('parota')" data-ar="باروتا" data-tr="Parota" data-en="Parota">باروتا</button>
            <button class="category-btn" onclick="filterCategory('drinks')" data-ar="المشروبات" data-tr="İçecekler" data-en="Drinks">المشروبات</button>
            <button class="category-btn" onclick="filterCategory('desserts')" data-ar="الحلويات" data-tr="Tatlılar" data-en="Desserts">الحلويات</button>
            <button class="category-btn" onclick="filterCategory('thermos')" data-ar="ترمس" data-tr="Termos" data-en="Thermos">ترمس</button>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid"></div>
    </main>

    <!-- Admin Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" data-ar="تسجيل الدخول" data-tr="Giriş Yap" data-en="Login">تسجيل الدخول</h2>
                <button class="close-btn" onclick="closeModal('loginModal')">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label" data-ar="كلمة المرور" data-tr="Şifre" data-en="Password">كلمة المرور</label>
                <input type="password" class="form-input" id="adminPassword" placeholder="••••••">
            </div>
            <button class="submit-btn" onclick="login()" data-ar="دخول" data-tr="Giriş" data-en="Login">دخول</button>
        </div>
    </div>

    <!-- Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle" data-ar="إضافة منتج" data-tr="Ürün Ekle" data-en="Add Product">إضافة منتج</h2>
                <button class="close-btn" onclick="closeModal('productModal')">&times;</button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <input type="hidden" id="productId">
                
                <div class="form-group">
                    <label class="form-label" data-ar="الصورة" data-tr="Görsel" data-en="Image">الصورة</label>
                    <div class="image-upload" onclick="document.getElementById('productImage').click()">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: var(--brown); margin-bottom: 10px;"></i>
                        <div data-ar="اضغط لرفع الصورة" data-tr="Görsel yüklemek için tıklayın" data-en="Click to upload image">اضغط لرفع الصورة</div>
                        <input type="file" id="productImage" accept="image/*" style="display: none;" onchange="previewImage(this)">

    <div class="admin-dashboard" id="adminDashboard" style="display: none;">

                        <div class="stat-label" data-ar="متوسط قيمة الطلب" data-tr="Ortalama Sipariş" data-en="Average Order">متوسط قيمة الطلب</div>
                        <div class="stat-value" id="avgOrder">0 TL</div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">

                    <button class="submit-btn" style="width: auto; padding: 10px 30px;" onclick="openAddModal()">
                        <i class="fas fa-plus"></i> <span data-ar="إضافة منتج" data-tr="Ürün Ekle" data-en="Add Product">إضافة منتج</span>

                <h2 style="margin-bottom: 1.5rem;" data-ar="سجل الطلبات" data-tr="Sipariş Geçmişi" data-en="Order History">سجل الطلبات</h2>
                <div class="chart-container">
                    <div id="ordersList"></div>

            </div>

            <!-- Settings Section -->
            <div id="settingsSection" style="display: none;">
                <h2 style="margin-bottom: 1.5rem;" data-ar="إعدادات النظام" data-tr="Sistem Ayarları" data-en="System Settings">إعدادات النظام</h2>
                <div class="chart-container">
                    <button class="action-btn delete-btn" style="width: 100%;" onclick="clearAllData()">
                        <i class="fas fa-trash"></i> <span data-ar="مسح جميع البيانات" data-tr="Tüm Verileri Sil" data-en="Clear All Data">مسح جميع البيانات</span>
                    </button>
                </div>
            </div>

    <script>
        // بيانات المنتجات الافتراضية
        let products = JSON.parse(localStorage.getItem('caykarak_products')) || [
            { id: 1, category: 'parota', nameAr: 'شباتي سادة', nameTr: 'Sade Parota', nameEn: 'Plain Parota', price: 50, image: '', description: 'شباتي هندي تقليدي', hidden: false, sales: 0 },
            { id: 2, category: 'parota', nameAr: 'شباتي بالجبن', nameTr: 'Peynirli Parota', nameEn: 'Cheese Parota', price: 70, image: '', description: 'شباتي محشو بالجبن', hidden: false, sales: 0 },
            { id: 3, category: 'parota', nameAr: 'شباتي بالعسل', nameTr: 'Ballı Parota', nameEn: 'Honey Parota', price: 70, image: '', description: 'شباتي بالعسل الطبيعي', hidden: false, sales: 0 },
            { id: 4, category: 'parota', nameAr: 'شباتي جبنة بالعسل', nameTr: 'Peynir ve Ballı Parota', nameEn: 'Honey and Cheese Parota', price: 80, image: '', description: 'مزيج مثالي من الجبن والعسل', hidden: false, sales: 0 },
            { id: 5, category: 'parota', nameAr: 'شباتي بالشوكولاتة', nameTr: 'Çikolatalı Parota', nameEn: 'Chocolate Parota', price: 70, image: '', description: 'شباتي بالشوكولاتة اللذيذة', hidden: false, sales: 0 },
            { id: 6, category: 'parota', nameAr: 'شباتي فاهيتا', nameTr: 'Fajita Tavuk Parota', nameEn: 'Chicken Shish Tawook Parota', price: 85, image: '', description: 'شباتي بالدجاج المشوي', hidden: false, sales: 0 },
            { id: 7, category: 'parota', nameAr: 'شباتي شيش طاووق', nameTr: 'Şiş Tavuk Parota', nameEn: 'Chicken Fajita Parota', price: 85, image: '', description: 'شباتي بالدجاج الفاهيتا', hidden: false, sales: 0 },
            { id: 8, category: 'parota', nameAr: 'شباتي بالبيض والجبن', nameTr: 'Yumurta ve Peynirli Parota', nameEn: 'Egg and Cheese Parota', price: 80, image: '', description: 'شباتي بالبيض والجبن', hidden: false, sales: 0 },
            { id: 9, category: 'drinks', nameAr: 'كرك', nameTr: 'Karak', nameEn: 'Karak Tea', price: 50, image: '', description: 'شاي كرك بالتوابل الهندية', hidden: false, sales: 0 },
            { id: 10, category: 'drinks', nameAr: 'شاي', nameTr: 'Çay', nameEn: 'Tea', price: 20, image: '', description: 'شاي تركي تقليدي', hidden: false, sales: 0 },
            { id: 11, category: 'drinks', nameAr: 'قهوة', nameTr: 'Kahve', nameEn: 'Coffee', price: 40, image: '', description: 'قهوة تركية أصيلة', hidden: false, sales: 0 },
            { id: 12, category: 'thermos', nameAr: 'تأجير دلة كرك', nameTr: 'Termosta Karak', nameEn: 'Karak Thermos Rental', price: 400, image: '', description: 'تأجير دلة كرك (1.9 لتر) + تأمين 400 ليرة', hidden: false, sales: 0 },
            { id: 13, category: 'desserts', nameAr: 'كيلو صفوف', nameTr: 'Kilo Suff', nameEn: 'Kilo Suff', price: 250, image: '', description: 'حلوى الصفوف التقليدية', hidden: false, sales: 0 },
            { id: 14, category: 'desserts', nameAr: 'كيلو مد بالقشطة', nameTr: 'Kilo Kadayıf', nameEn: 'Kilo with Cream', price: 250, image: '', description: 'كيلو مد بالقشطة الطازجة', hidden: false, sales: 0 },
            { id: 15, category: 'desserts', nameAr: 'كيلو مد بالتمر', nameTr: 'Kilo Hurmalı', nameEn: 'Kilo with Dates', price: 250, image: '', description: 'كيلو مد بالتمر الفاخر', hidden: false, sales: 0 },
            { id: 16, category: 'desserts', nameAr: 'كيلو مد بالفستق الحلبي', nameTr: 'Kilo Antep Fıstıklı', nameEn: 'Kilo with Pistachio', price: 250, image: '', description: 'كيلو مد بالفستق الحلبي', hidden: false, sales: 0 }
        ];

        let cart = JSON.parse(localStorage.getItem('caykarak_cart')) || [];
        let orders = JSON.parse(localStorage.getItem('caykarak_orders')) || [];
        let currentLang = 'ar';
        let isAdmin = false;
        let currentCategory = 'all';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCart();
            updateLanguage();
        });

        // Language Functions
        function changeLang(lang) {
            currentLang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
            
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            updateLanguage();
            renderProducts();
        }

        function updateLanguage() {
            document.querySelectorAll('[data-ar]').forEach(el => {
                el.textContent = el.getAttribute(`data-${currentLang}`);
            });
        }

        // Category Filter
        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts();
        }

        // Render Products
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            const filtered = currentCategory === 'all' 
                ? products.filter(p => !p.hidden)
                : products.filter(p => p.category === currentCategory && !p.hidden);
            
            filtered.forEach(product => {
                const card = createProductCard(product);
                grid.appendChild(card);
            });
        }

        function createProductCard(product) {
            const div = document.createElement('div');
            div.className = 'product-card';
            
            const name = product[`name${currentLang.charAt(0).toUpperCase() + currentLang.slice(1)}`];
            
            div.innerHTML = `
                <div class="product-image">
                    ${product.image ? `<img src="${product.image}" alt="${name}">` : '<i class="fas fa-utensils"></i>'}
                    <div class="add-to-cart-overlay">
                        <button class="add-to-cart-btn" onclick="addToCart(${product.id})">
                            <i class="fas fa-plus"></i> <span data-ar="أضف للسلة" data-tr="Sepete Ekle" data-en="Add to Cart">أضف للسلة</span>
                        </button>
                    </div>
                </div>
                <div class="product-info">
                    <div class="product-header">
                        <div>
                            <div class="product-name">${name}</div>
                            <div class="product-name-tr">${product.nameTr}</div>
                            <div class="product-name-en">${product.nameEn}</div>
                        </div>
                        <div class="product-price">${product.price} TL</div>
                    </div>
                    <div class="product-desc">${product.description || ''}</div>
                </div>
            `;
            
            return div;
        }

        // Cart Functions
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({
                    id: productId,
                    quantity: 1,
                    ...product
                });
            }
            
            saveCart();
            updateCart();
            showToast(currentLang === 'ar' ? 'تمت الإضافة للسلة' : currentLang === 'tr' ? 'Sepete eklendi' : 'Added to cart');
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveCart();
            updateCart();
        }

        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    saveCart();
                    updateCart();
                }
            }
        }

        function saveCart() {
            localStorage.setItem('caykarak_cart', JSON.stringify(cart));
        }

        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartFooter = document.getElementById('cartFooter');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;
            
            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-basket"></i>
                        <div data-ar="السلة فارغة" data-tr="Sepet boş" data-en="Cart is empty">السلة فارغة</div>
                    </div>
                `;
                cartFooter.style.display = 'none';
                return;
            }
            
            cartFooter.style.display = 'block';
            cartItems.innerHTML = '';
            
            let total = 0;
            
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div class="cart-item-image">
                        ${item.image ? `<img src="${item.image}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">` : '<i class="fas fa-utensils"></i>'}
                    </div>
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item[`name${currentLang.charAt(0).toUpperCase() + currentLang.slice(1)}`]}</div>
                        <div class="cart-item-price">${item.price} TL</div>
                        <div class="quantity-control">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                    </div>
                    <button class="remove-item" onclick="removeFromCart(${item.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                cartItems.appendChild(div);
            });
            
            cartTotal.textContent = total + ' TL';
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function closeCart() {
            document.getElementById('cartSidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        function checkout() {
            const tableNumber = document.getElementById('tableNumber').value;
            if (!tableNumber) {
                alert(currentLang === 'ar' ? 'الرجاء إدخال رقم الطاولة' : 'Please enter table number');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const order = {
                id: Date.now(),
                table: tableNumber,
                items: [...cart],
                total: total,
                date: new Date().toISOString(),
                status: 'pending'
            };
            
            orders.push(order);
            localStorage.setItem
